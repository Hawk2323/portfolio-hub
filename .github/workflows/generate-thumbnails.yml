name: Generate thumbnails

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - data/projects.json
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  thumbnails:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.57.0-noble
      options: --ipc=host
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run thumbnails
      - name: Commit thumbnail updates
        run: |
          if [ -n "$(git status --porcelain data/projects.json public/thumbnails)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/projects.json public/thumbnails
            git commit -m "Generate portfolio thumbnails"
            git push
          else
            echo "No thumbnail changes."
          fi
